<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Winflex — Lámina PET/PE</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23185FA5'/%3E%3Ctext x='32' y='47' font-family='Arial Black, Arial' font-weight='900' font-size='40' fill='white' text-anchor='middle'%3EW%3C/text%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:   #ffffff; --bg2: #f5f5f3; --bg3: #eeede8; --bg4: #e8e7e2;
  --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
  --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.20);
  --blue: #185FA5; --blue-dk: #0C447C; --blue-lt: #E6F1FB; --blue-xlt: #f0f7fd;
  --green: #1D9E75; --green-dk: #0F6E56; --green-lt: #E1F5EE; --green-xlt: #f0faf6;
  --red: #A32D2D; --red-lt: #FCEBEB;
  --amber: #854F0B; --amber-lt: #FAEEDA;
  --r: 8px; --rl: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
  --sidebar: 224px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg3);color:var(--text);min-height:100vh}

/* ── LAYOUT ── */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.main{margin-left:var(--sidebar);min-height:100vh}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;gap:12px}
.content{padding:20px 24px}

/* ── SIDEBAR ── */
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-mark{font-size:18px;font-weight:700;color:var(--blue);letter-spacing:-.5px}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.nav{padding:8px 8px;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .1s}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--blue-lt);color:var(--blue);font-weight:600}
.nav-item .icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .icon{opacity:1}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.6}

/* ── TOPBAR ── */
.page-heading{font-size:16px;font-weight:600}
.page-sub{font-size:11px;color:var(--text3);margin-top:1px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .1s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dk)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-dk)}
.btn-ghost{background:var(--bg2);color:var(--text);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--bg3)}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.kpi-val{font-size:22px;font-weight:700;letter-spacing:-.5px}
.kpi-lbl{font-size:12px;color:var(--text2);margin-top:3px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* ── CARDS ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow)}
.card-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600}
.card-hint{font-size:11px;color:var(--text3)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--blue)}
tbody tr{border-bottom:1px solid var(--border);transition:background .07s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f0f7ff}
tbody tr.sel{background:#deeeff!important}
td{padding:9px 12px;vertical-align:middle}
.tr{text-align:right}
.tnr{font-variant-numeric:tabular-nums;text-align:right}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;line-height:1.5}
.b-negro{background:#2C2C2A;color:#D3D1C7}
.b-up{background:var(--green-lt);color:var(--green-dk)}
.b-down{background:var(--red-lt);color:var(--red)}
.b-neutral{background:var(--bg2);color:var(--text2)}

/* ── BAR ── */
.bar-wrap{display:flex;align-items:center;gap:7px}
.bar-bg{flex:1;background:var(--bg3);height:6px;border-radius:3px;overflow:hidden;min-width:48px}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-num{font-size:11.5px;font-variant-numeric:tabular-nums;min-width:36px;text-align:right;color:var(--text2)}

/* ── INPUTS ── */
.price-inp{width:78px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;text-align:right;font-size:12.5px;font-variant-numeric:tabular-nums;color:var(--text);padding:4px 8px;outline:none;transition:border-color .1s}
.price-inp:focus{border-color:var(--blue);background:var(--bg)}
.param-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.param-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.param-inp{width:100%;background:transparent;border:none;border-bottom:2px solid var(--border);font-size:18px;font-weight:700;color:var(--text);padding:2px 0;outline:none;transition:border-color .15s}
.param-inp:focus{border-bottom-color:var(--blue)}
.param-unit{font-size:10px;color:var(--text3);margin-top:3px}

/* ── PRECIOS SECTION ── */
.params-bar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.price-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.price-client-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.pcc-header{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.pcc-name{font-size:14px;font-weight:600}
.pcc-medida{font-size:11px;color:var(--text3);margin-top:1px}
.pcc-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-bottom:1px solid var(--border)}
.pcc-kpi{padding:8px 12px;text-align:center;border-right:1px solid var(--border)}
.pcc-kpi:last-child{border-right:none}
.pcc-kpi-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.pcc-kpi-lbl{font-size:10px;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:.03em}
/* precio hero — lo más visible de la card */
.pcc-price-hero{background:var(--blue);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.pcc-price-hero-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.pcc-price-hero-inp{background:transparent;border:none;border-bottom:2px solid rgba(255,255,255,.5);color:#fff;font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;width:110px;text-align:right;outline:none;transition:border-color .15s;padding:0}
.pcc-price-hero-inp:focus{border-bottom-color:#fff}
.pcc-prev{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--text3)}
.pcc-prev strong{font-variant-numeric:tabular-nums;color:var(--text2)}
.pcc-pcts-wrap{padding:10px 16px 14px}
.pcc-pct-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.pct-btns{display:flex;gap:5px;flex-wrap:wrap}
.pct-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .1s}
.pct-btn:hover{background:var(--bg3);color:var(--text)}
.pct-btn.pct-on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── COSTOS SECTION ── */
.cost-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.cost-client-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ccc-head{background:var(--blue);padding:12px 16px;color:#fff}
.ccc-head-name{font-size:13px;font-weight:700}
.ccc-head-medida{font-size:11px;opacity:.75;margin-top:1px}
.ccc-body{padding:12px 16px}
.ccc-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.ccc-row:last-child{border-bottom:none}
.ccc-lbl{color:var(--text2)}
.ccc-val{font-weight:500;font-variant-numeric:tabular-nums}
.ccc-total{background:var(--green-lt);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
.ccc-total-lbl{font-size:12px;font-weight:700;color:var(--green-dk)}
.ccc-total-val{font-size:16px;font-weight:800;color:var(--green-dk);font-variant-numeric:tabular-nums}

/* ── DETAIL ── */
.detail-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.detail-head{background:linear-gradient(135deg,var(--blue-dk),var(--blue));padding:22px 24px;color:#fff}
.detail-head-name{font-size:20px;font-weight:800;margin-bottom:2px}
.detail-head-sub{font-size:13px;opacity:.75}
.detail-kpis{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.dk{padding:16px 20px;border-right:1px solid var(--border)}
.dk:last-child{border-right:none}
.dk-num{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.dk-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.detail-body{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
.detail-col{padding:18px 20px;border-right:1px solid var(--border)}
.detail-col:last-child{border-right:none}
.dc-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.dc-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--border)}
.dc-row:last-child{border-bottom:none}
.dc-lbl{color:var(--text2)}
.dc-val{font-weight:500;font-variant-numeric:tabular-nums}
.dc-inp{width:68px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;text-align:right;font-size:12.5px;font-weight:600;color:var(--text);padding:3px 7px;outline:none;transition:border-color .1s}
.dc-inp:focus{border-color:var(--blue)}
.detail-price{padding:16px 20px;border-top:1px solid var(--border);background:var(--bg2)}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)}
.dp-row:last-child{border-bottom:none}

/* ── ANÁLISIS ── */
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:14px}
.rbar-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.rbar-rank{font-size:11px;font-weight:700;color:var(--text3);width:16px;text-align:right;flex-shrink:0}
.rbar-name{font-size:11.5px;color:var(--text2);width:82px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.rbar-track{flex:1;background:var(--bg3);height:20px;border-radius:4px;overflow:hidden}
.rbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.rbar-val{font-size:11px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;white-space:nowrap}
.stat-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{color:var(--text2)}
.stat-val{font-weight:600;font-variant-numeric:tabular-nums}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.empty{text-align:center;padding:48px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ── PEDIDOS ── */
.ped-layout{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start}
.ped-form-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;position:sticky;top:80px}
.ped-form-head{background:var(--blue);padding:14px 18px;color:#fff}
.ped-form-head h3{font-size:14px;font-weight:700;margin:0}
.ped-form-head p{font-size:11px;opacity:.7;margin-top:2px}
.ped-form-body{padding:16px 18px}
.ped-field{margin-bottom:12px}
.ped-field label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.ped-field select,.ped-field input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .12s;font-family:inherit}
.ped-field select:focus,.ped-field input:focus{border-color:var(--blue)}
.ped-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ped-submit{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .1s}
.ped-submit:hover{background:var(--blue-dk)}
.ped-right{display:flex;flex-direction:column;gap:14px}
.ped-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ped-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ped-report-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ped-report-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ped-report-title{font-size:13px;font-weight:600}
.ped-hist-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ped-hist-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ped-hist-title{font-size:13px;font-weight:600}
.ped-hist-filter{display:flex;gap:6px}
.ped-hist-filter select{padding:4px 8px;font-size:12px;border:1px solid var(--border2);border-radius:5px;background:var(--bg2);color:var(--text);outline:none}
.ped-table{width:100%;border-collapse:collapse;font-size:12.5px}
.ped-table thead th{padding:7px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap}
.ped-table tbody tr{border-bottom:1px solid var(--border)}
.ped-table tbody tr:last-child{border-bottom:none}
.ped-table tbody tr:hover{background:var(--bg2)}
.ped-table td{padding:6px 12px;vertical-align:middle}
.ped-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 6px;border-radius:4px;font-size:12px;transition:all .1s}
.ped-del:hover{color:var(--red);background:var(--red-lt)}
.rept-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.rept-row:last-child{border-bottom:none}
.rept-lbl{color:var(--text2)}
.rept-val{font-weight:600;font-variant-numeric:tabular-nums}
.empty-ped{padding:32px 18px;text-align:center;color:var(--text3);font-size:13px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useMemo,useCallback} = React;

/* ═══════════════════ DATOS ═══════════════════════════════════════════════ */
const INIT_PARAMS = {

/* ═══════════════════ COSTO LAMINADO + REFILADO ═══════════════════════════ */
function calcLaminado(p) {
  const tc = p.tipoCambioLam;
  // LAMINADO
  const lam_mo      = p.lam_salario * (1 + p.lam_cargasSoc/100) / p.lam_prodHora / tc;
  const lam_total   = p.lam_mpAdhesivo + lam_mo + p.lam_energia + p.lam_otrosGastos;
  // REFILADO
  const ref_mo      = p.ref_salario * (1 + p.ref_cargasSoc/100) / p.ref_prodHora / tc;
  const ref_energia = p.ref_cantMotores * p.ref_consumoMotor / p.ref_prodHora * p.ref_costoKwh;
  const ref_total   = ref_mo + ref_energia + p.ref_otrosGastos;
  // TOTAL
  const total = lam_total + ref_total;
  return { lam_mp:p.lam_mpAdhesivo, lam_mo, lam_energia:p.lam_energia, lam_otros:p.lam_otrosGastos, lam_total,
           ref_mo, ref_energia, ref_otros:p.ref_otrosGastos, ref_total, total };
}

/* ═══════════════════ MODELO COMBINADO v2 ════════════════════════════════ */
function calcCosto(c, p) {
  const costPET = c.negro ? p.petNegro : p.pet;
  const gPET = c.ePET * 1.35;
  const gPE  = c.ePE  * 0.92;
  const gTot = gPET + gPE;
  const pctPET = gPET / gTot;
  const pctPE  = gPE  / gTot;
  const tirasPET = Math.max(Math.floor(c.aPET / c.aF), 1);
  const tirasPE  = Math.max(Math.floor(c.aPE  / c.aF), 1);
  const yPET = tirasPET * c.aF / c.aPET;
  const yPE  = tirasPE  * c.aF / c.aPE;
  const PETbruto = pctPET / yPET;
  const PEbruto  = pctPE  / yPE;
  const PEcons   = PEbruto / 0.95;
  const kgProc   = PETbruto + PEbruto;
  const lamCosto = calcLaminado(p);
  const cPET  = PETbruto * costPET;
  const cPE   = PEcons   * p.pe;
  const cProc = kgProc   * lamCosto.total;   // ← calculado dinámicamente
  const cOvh  = p.overhead;
  const costoKg = cPET + cPE + cProc + cOvh;
  const ganancia = c.pVenta - costoKg;
  const margen   = c.pVenta > 0 ? ganancia / c.pVenta * 100 : 0;
  const markup   = costoKg > 0  ? ganancia / costoKg  * 100 : 0;
  const pctVsAnt = c.pAnt > 0   ? (c.pVenta / c.pAnt - 1) * 100 : 0;
  return {tirasPET,tirasPE,yPET,yPE,PETbruto,PEbruto,PEcons,kgProc,
          cPET,cPE,cProc,cOvh,costoKg,ganancia,margen,markup,pctVsAnt,
          lamDesglose:lamCosto};
}

const JBIN_KEY = '$2a$10$8p4t41BnTv.9Ls.4kFLhouDMqJGQEd5LQlBYEz8n1y6nH/3dFq27G';
const JBIN_URL = 'https://api.jsonbin.io/v3';

async function jbinLoad(binIdKey) {
  const binId = localStorage.getItem(binIdKey);
  if (!binId) return null;
  try {
    const res = await fetch(JBIN_URL+'/b/'+binId+'/latest', {
      headers: {'X-Master-Key': JBIN_KEY},
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) return null;
    const d = await res.json();
    return d.record || null;
  } catch(e) { return null; }
}

async function jbinSave(binIdKey, label, data) {
  let binId = localStorage.getItem(binIdKey);
  try {
    if (!binId) {
      const res = await fetch(JBIN_URL+'/b', {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-Master-Key':JBIN_KEY,'X-Bin-Name':label,'X-Bin-Private':'false'},
        body: JSON.stringify(data),
        signal: AbortSignal.timeout(8000)
      });
      if (!res.ok) return false;
      const d = await res.json();
      binId = d.metadata && d.metadata.id;
      if (binId) localStorage.setItem(binIdKey, binId);
      return !!binId;
    } else {
      const res = await fetch(JBIN_URL+'/b/'+binId, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-Master-Key':JBIN_KEY},
        body: JSON.stringify(data),
        signal: AbortSignal.timeout(8000)
      });
      return res.ok;
    }
  } catch(e) { return false; }
}

  function savePedidos(arr) {
    setPedidos(arr);
    try { localStorage.setItem('winflex_pedidos', JSON.stringify(arr)); } catch {}
  }

  function addPedido() {
    if (!pedForm.clienteId || !pedForm.kg || !pedForm.precioUSD) return;
    const cl = computed.find(c=>c.id===Number(pedForm.clienteId));
    if (!cl) return;
    const kg = parseFloat(pedForm.kg), precio = parseFloat(pedForm.precioUSD);
    const costo = parseFloat(f2u(cl.costoKg));
    const ganKg = parseFloat(f2u(precio - costo));
    const nuevo = {
      id: Date.now(), fecha: pedForm.fecha,
      clienteId: cl.id, nombre: cl.name, medida: cl.med,
      kg, precio, costo, gananciaKg: ganKg,
      gananciaTotal: parseFloat(f2u(ganKg*kg)),
      margen: parseFloat((precio>0?(precio-costo)/precio*100:0).toFixed(1)),
      montoTotal: parseFloat(f2u(precio*kg)),
      nroOC: pedForm.nroOC, nota: pedForm.nota,
      entregas: [], // array de {id, fecha, kg, nota}
    };
    savePedidos([nuevo, ...pedidos]);
    setPedForm(f=>({...f,kg:'',precioUSD:'',nroOC:'',nota:''}));
  }

  function delPedido(id) { savePedidos(pedidos.filter(p=>p.id!==id)); }

  function addEntrega(pedId) {
    const ef = entregaForm[pedId]||{};
    if (!ef.kg || parseFloat(ef.kg)<=0) return;
    savePedidos(pedidos.map(p=>{
      if (p.id!==pedId) return p;
      const entregadas = (p.entregas||[]).reduce((s,e)=>s+e.kg,0);
      const disponible = p.kg - entregadas;
      const kg = Math.min(parseFloat(ef.kg), disponible);
      if (kg<=0) return p;
      const nuevaEntrega = {id:Date.now(), fecha:ef.fecha||today(), kg, nota:ef.nota||''};
      return {...p, entregas:[...(p.entregas||[]), nuevaEntrega]};
    }));
    setEntregaForm(f=>({...f,[pedId]:{fecha:today(),kg:'',nota:''}}));
  }

  function delEntrega(pedId, entId) {
    savePedidos(pedidos.map(p=>p.id!==pedId?p:{...p,entregas:(p.entregas||[]).filter(e=>e.id!==entId)}));
  }

  function getEstado(p) {
    const entregado = (p.entregas||[]).reduce((s,e)=>s+e.kg,0);
    if (entregado===0) return 'pendiente';
    if (entregado>=p.kg) return 'completo';
    return 'parcial';
  }

  function exportPedidos() {
    const XLS=window.XLSX, wb=XLS.utils.book_new();
    const hoy=new Date().toLocaleDateString('es-AR');
    const n_=(v,fmt='#,##0.00')=>({v,t:'n',z:fmt});
    const s_=v=>({v,t:'s'});
    // Pedidos
    const rows=[[s_('WINFLEX S.A. — Historial de Pedidos')],[s_('Exportado: '+hoy)],[],
      ['Fecha','OC','Cliente','Medida','Kg pedidos','Kg entregados','Kg pendiente','Estado','Precio/kg','Costo/kg','Gan/kg','Monto total','Margen %','Nota'].map(s_)];
    pedidos.forEach(p=>{
      const entregado=(p.entregas||[]).reduce((s,e)=>s+e.kg,0);
      rows.push([s_(p.fecha),s_(p.nroOC||''),s_(p.nombre),s_(p.medida),
        n_(p.kg,'#,##0'),n_(entregado,'#,##0'),n_(p.kg-entregado,'#,##0'),
        s_(getEstado(p)),n_(p.precio),n_(p.costo),n_(p.gananciaKg),n_(p.montoTotal),{v:p.margen/100,t:'n',z:'0.0%'},s_(p.nota||'')]);
      // entregas parciales indentadas
      (p.entregas||[]).forEach(e=>rows.push([s_('  └ '+e.fecha),s_(''),s_(''),s_(''),s_(''),n_(e.kg,'#,##0'),s_(''),s_(e.nota||''),s_(''),s_(''),s_(''),s_(''),s_(''),s_('')]));
    });
    const ws=XLS.utils.aoa_to_sheet(rows);
    ws['!cols']=[10,10,14,10,10,10,10,10,10,10,10,11,9,16].map(w=>({wch:w}));
    XLS.utils.book_append_sheet(wb,ws,'Pedidos');
    // Resumen por cliente
    const byC={};
    pedidos.forEach(p=>{
      if(!byC[p.nombre]) byC[p.nombre]={nombre:p.nombre,cant:0,kg:0,entregado:0,monto:0,ganancia:0};
      byC[p.nombre].cant++; byC[p.nombre].kg+=p.kg;
      byC[p.nombre].entregado+=(p.entregas||[]).reduce((s,e)=>s+e.kg,0);
      byC[p.nombre].monto+=p.montoTotal; byC[p.nombre].ganancia+=p.gananciaTotal;
    });
    const r2=[[s_('Resumen por Cliente')],[],[],['Cliente','Pedidos','Kg pedidos','Kg entregados','Monto total','Ganancia','Precio prom.','Margen prom.'].map(s_)];
    Object.values(byC).sort((a,b)=>b.monto-a.monto).forEach(d=>r2.push([s_(d.nombre),{v:d.cant,t:'n',z:'0'},n_(d.kg,'#,##0'),n_(d.entregado,'#,##0'),n_(d.monto),n_(d.ganancia),n_(d.monto/d.kg),{v:d.ganancia/d.monto,t:'n',z:'0.0%'}]));
    const ws2=XLS.utils.aoa_to_sheet(r2); ws2['!cols']=[16,8,10,11,11,11,11,10].map(w=>({wch:w}));
    XLS.utils.book_append_sheet(wb,ws2,'Por cliente');
    XLS.writeFile(wb,'Winflex_Pedidos_'+new Date().toISOString().slice(0,10)+'.xlsx');
  }

              color:syncStatus==='saved'?'var(--green-dk)':syncStatus==='error'?'var(--red)':syncStatus==='loading'?'var(--blue)':'var(--text3)',
            }},
            syncStatus==='saving'?'☁ guardando…':syncStatus==='saved'?'☁ sincronizado':syncStatus==='error'?'☁ sin conexión':syncStatus==='loading'?'☁ cargando…':'☁'
