<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Winflex — Lámina PET</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-lamina-192.png">
<meta name="theme-color" content="#1e9e62">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.20);
  --blue:#1E9E62;--blue-dk:#15663F;--blue-lt:#E8F7EE;--blue-xlt:#EEF9F3;
  --green:#1D9E75;--green-dk:#0F6E56;--green-lt:#E1F5EE;
  --red:#A32D2D;--red-lt:#FCEBEB;
  --amber:#854F0B;--amber-lt:#FAEEDA;
  --teal:#0F6E56;--teal-lt:#D5F0E5;
  --r:8px;--rl:12px;
  --sidebar:224px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg3);color:var(--text);min-height:100vh}

/* Layout */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.main{margin-left:var(--sidebar);min-height:100vh}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;gap:12px}
.content{padding:20px 24px}

/* Sidebar */
.logo{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.logo-mark{font-size:17px;font-weight:700;color:var(--blue);letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px}
.logo-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--teal-lt);color:var(--teal);margin-top:4px}
.nav{padding:8px;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .1s}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--blue-lt);color:var(--blue);font-weight:600}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.6}

/* Topbar */
.page-heading{font-size:16px;font-weight:600}
.page-sub{font-size:11px;color:var(--text3);margin-top:1px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .1s;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue-dk)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-dk)}
.btn-ghost{background:var(--bg2);color:var(--text);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--bg3)}
.btn:active{transform:scale(.98)}

/* Cards */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:var(--bg);border-radius:var(--rl);border:1px solid var(--border);padding:14px 16px}
.kpi-val{font-size:22px;font-weight:600}
.kpi-lbl{font-size:12px;color:var(--text2);margin-top:2px}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:1px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600}

/* Table */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 12px;text-align:left;font-weight:500;font-size:11.5px;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--blue)}
tbody tr{border-bottom:1px solid var(--border);transition:background .07s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#EEF9F3}
tbody tr.sel{background:#DDF3E6!important}
td{padding:8px 12px;vertical-align:middle}
.tr{text-align:right;font-variant-numeric:tabular-nums}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.b-up{background:var(--green-lt);color:var(--green-dk)}
.b-down{background:var(--red-lt);color:var(--red)}
.b-neutral{background:var(--bg2);color:var(--text2)}
.b-crystal{background:#E8F7EE;color:#15663F}

/* Bar */
.bar-wrap{display:flex;align-items:center;gap:7px}
.bar-bg{flex:1;background:var(--bg3);height:6px;border-radius:3px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-num{font-size:11px;font-variant-numeric:tabular-nums;min-width:38px;text-align:right;color:var(--text2)}

/* Price input */
.pinp{width:74px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;text-align:right;font-size:13px;font-variant-numeric:tabular-nums;color:var(--text);padding:4px 7px;outline:none;transition:border-color .12s}
.pinp:focus{border-color:var(--blue);background:var(--bg)}

/* Params grid */
.params-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px}
.param-section{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.param-section-head{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.param-section-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.param-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.param-lbl{font-size:12.5px;color:var(--text2);flex:1}
.param-inp{width:110px;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;text-align:right;font-size:13px;font-weight:600;color:var(--text);padding:5px 8px;outline:none;transition:border-color .12s}
.param-inp:focus{border-color:var(--blue);background:var(--bg)}
.param-unit{font-size:11px;color:var(--text3);width:80px}

/* Cost breakdown */
.cost-total-card{background:var(--blue);color:#fff;border-radius:var(--rl);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.cost-total-val{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums}
.cost-total-lbl{font-size:12px;opacity:.8;margin-top:2px}
.cost-breakdown-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.cost-comp-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.cost-comp-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.cost-comp-lbl{font-size:11px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.cost-comp-pct{font-size:11px;color:var(--text2);margin-top:3px}
.cost-bar{width:100%;background:var(--bg3);height:4px;border-radius:2px;overflow:hidden;margin-top:6px}
.cost-bar-fill{height:100%;border-radius:2px}

/* Precios window */
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pcc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.pcc-head{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.pcc-name{font-size:13px;font-weight:600}
.pcc-hero{background:var(--blue);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.pcc-hero-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.pcc-hero-inp{background:transparent;border:none;border-bottom:2px solid rgba(255,255,255,.5);color:#fff;font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;width:100px;text-align:right;outline:none;padding:0}
.pcc-hero-inp:focus{border-bottom-color:#fff}
.pcc-prev{padding:7px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--text3);display:flex;justify-content:space-between}
.pcc-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-bottom:1px solid var(--border)}
.pcc-kpi{padding:7px 10px;text-align:center;border-right:1px solid var(--border)}
.pcc-kpi:last-child{border-right:none}
.pcc-kpi-val{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.pcc-kpi-lbl{font-size:9px;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:.03em}
.pcc-pcts{padding:10px 16px 14px}
.pcc-pct-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.pct-btns{display:flex;gap:5px;flex-wrap:wrap}
.pct-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .1s}
.pct-btn:hover{background:var(--bg3);color:var(--text)}
.pct-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* Analysis */
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:12px}
.rbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rbar-rank{font-size:11px;font-weight:700;color:var(--text3);width:16px;text-align:right;flex-shrink:0}
.rbar-name{font-size:11.5px;color:var(--text2);width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.rbar-track{flex:1;background:var(--bg3);height:20px;border-radius:4px;overflow:hidden}
.rbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.rbar-val{font-size:11px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;white-space:nowrap}
.stat-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{color:var(--text2)}
.stat-val{font-weight:600;font-variant-numeric:tabular-nums}

/* Detalle */
.det-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.det-head{background:linear-gradient(135deg,var(--blue-dk),var(--blue));padding:20px 24px;color:#fff}
.det-head-n{font-size:20px;font-weight:800;margin-bottom:2px}
.det-head-s{font-size:12px;opacity:.7}
.det-kpis{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.dk{padding:14px 18px;border-right:1px solid var(--border)}
.dk:last-child{border-right:none}
.dk-num{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.dk-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.det-body{padding:18px 20px}
.det-sec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;margin-top:14px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow-lbl{color:var(--text2)}
.drow-val{font-weight:500;font-variant-numeric:tabular-nums}
.det-price-sect{padding:16px 20px;border-top:1px solid var(--border);background:var(--bg2)}

/* Pedidos */
.ped-layout{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start}
.ped-form-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;position:sticky;top:80px}
.ped-form-head{background:var(--blue);padding:13px 18px;color:#fff}
.ped-form-head h3{font-size:14px;font-weight:700;margin:0}
.ped-form-head p{font-size:11px;opacity:.7;margin-top:2px}
.ped-form-body{padding:14px 18px}
.ped-field{margin-bottom:11px}
.ped-field label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.ped-field select,.ped-field input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .12s;font-family:inherit}
.ped-field select:focus,.ped-field input:focus{border-color:var(--blue)}
.ped-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ped-submit{width:100%;padding:9px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;transition:background .1s}
.ped-submit:hover{background:var(--blue-dk)}
.ped-right{display:flex;flex-direction:column;gap:14px}
.ped-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ped-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ped-report-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ped-report-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600}
.ped-hist-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ped-hist-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ped-hist-title{font-size:13px;font-weight:600}
.rept-row{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;border-bottom:1px solid var(--border);font-size:12.5px}
.rept-row:last-child{border-bottom:none}
.ped-table{width:100%;border-collapse:collapse;font-size:12.5px}
.ped-table thead th{padding:7px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap}
.ped-table tbody tr{border-bottom:1px solid var(--border)}
.ped-table tbody tr:hover{background:var(--bg2)}
.ped-table td{padding:6px 12px;vertical-align:middle}
.ped-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 6px;border-radius:4px;font-size:12px;transition:all .1s}
.ped-del:hover{color:var(--red);background:var(--red-lt)}
.empty-ped{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.ped-expand{background:var(--bg2);border-top:1px solid var(--border);padding:14px 18px 16px}

/* Agregar cliente */
.nuevo-layout{display:grid;grid-template-columns:380px 1fr;gap:18px;align-items:start}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.empty{text-align:center;padding:48px;color:var(--text3)}
</style>
</head>

/* ═══════════════ MODELO DE COSTO ═══════════════════════════════════════ */
function calcCostoBase(p, esVirgen){
  const precP  = esVirgen ? p.precioPreformaVirgen : p.precioPreforma;
  const mp_base = precP*(p.pctPreforma/100) + p.precioScrap*(p.pctScrap/100);
  const mp_adj  = mp_base*(1 + p.merma/100 - p.recuperacion/100);
  const mo      = p.valorHoraMO*p.cantOperarios*(1+p.cargasSoc/100)/p.prodHora/p.tipoCambio;
  const pallet  = p.costoPallet/p.capPallet/p.tipoCambio;
  const base    = mp_adj + p.costoEnergia + mo + p.gastosVarios + pallet + p.otros;
  return {mp_adj, energia:p.costoEnergia, mo, gastosVarios:p.gastosVarios, pallet, otros:p.otros, base};
}

function calcCostoTipo(tipo, p){
  const t = TIPOS[tipo]||TIPOS.cristal;
  const esVirgen = t.base==='virgen';
  const cb = calcCostoBase(p, esVirgen);
  // Extra por master de color
  const masters = {blanco:p.masterBlanco, blanco_ab:p.masterBlanco, negro:p.masterNegro, azulino:p.masterAzulino, azulino_v:p.masterAzulino, gris:p.masterGris};
  const extras  = {blanco_ab: p.masterAntiblocking};
  let extra = (masters[tipo]||0) * (p.pctMaster/100);
  if(tipo==='blanco_ab') extra += (p.masterAntiblocking||0) * (p.pctMaster/100);
  const total = cb.base + extra;
  return {...cb, extra, total, mp_adj:cb.mp_adj, esVirgen};
}

function calcCosto(p){ return calcCostoTipo('cristal', p); }

function calcCliente(c, p){
  const costo = calcCostoTipo(c.tipo||'cristal', p);
  const ganancia = c.pventa - costo.total;
  const margen   = c.pventa>0 ? ganancia/c.pventa*100 : 0;
  const markup   = costo.total>0 ? ganancia/costo.total*100 : 0;
  const pctVsAnt = c.pant>0 ? (c.pventa/c.pant-1)*100 : 0;
  return {ganancia, margen, markup, pctVsAnt, costoKg:costo.total, costoDetalle:costo};
}

          style:{padding:'5px 12px',background:'rgba(255,255,255,.2)',border:'1px solid rgba(255,255,255,.4)',borderRadius:'var(--r)',color:'#fff',fontSize:11,cursor:'pointer',fontWeight:600},
          onClick:()=>{if(confirm('¿Restablecer todos los parámetros a los valores originales?')){setParams(INIT_PARAMS);localStorage.removeItem('winflex_pet_params');}}
        },'↺ Restablecer originales')
      )
    ),
    C('div',{className:'params-grid'},
      // Materia Prima
      C('div',{className:'param-section'},
        C('div',{className:'param-section-head'},'Materia Prima'),
        C('div',{className:'param-section-body'},
          [
            {k:'precioPreforma',lbl:'Precio Preforma Molida',u:'USD/kg'},
            {k:'pctPreforma',   lbl:'% Preforma Molida',    u:'%'},
            {k:'precioScrap',   lbl:'Precio Scrap Interno', u:'USD/kg'},
            {k:'pctScrap',      lbl:'% Scrap Interno',      u:'%'},
            {k:'merma',         lbl:'Merma proceso',        u:'%'},
            {k:'recuperacion',  lbl:'Recuperación merma',   u:'%'},
          ].map(({k,lbl,u})=>C('div',{key:k,className:'param-row'},
            C('span',{className:'param-lbl'},lbl),
            C('input',{className:'param-inp',type:'number',step:'0.01',value:params[k],onChange:e=>upParam(k,e.target.value)}),
            C('span',{className:'param-unit'},u)
          ))
        )
      ),
      // Proceso
      C('div',{className:'param-section'},
        C('div',{className:'param-section-head'},'Proceso y Producción'),
        C('div',{className:'param-section-body'},
          [
            {k:'costoEnergia',  lbl:'Costo Energía',        u:'USD/kg'},
            {k:'gastosVarios',  lbl:'Gastos Varios',        u:'USD/kg'},
            {k:'otros',         lbl:'Otros',                u:'USD/kg'},
            {k:'valorHoraMO',   lbl:'Valor Hora MO',        u:'ARS/h'},
            {k:'cantOperarios', lbl:'Cant. Operarios',      u:''},
            {k:'cargasSoc',     lbl:'Cargas Sociales',      u:'%'},
            {k:'prodHora',      lbl:'Producción',           u:'kg/h'},
          ].map(({k,lbl,u})=>C('div',{key:k,className:'param-row'},
            C('span',{className:'param-lbl'},lbl),
            C('input',{className:'param-inp',type:'number',step:'0.01',value:params[k],onChange:e=>upParam(k,e.target.value)}),
            C('span',{className:'param-unit'},u)
          ))
        )
      ),
      // Pallet + Tipo de cambio
      C('div',{className:'param-section'},
        C('div',{className:'param-section-head'},'Pallet y Tipo de Cambio'),
        C('div',{className:'param-section-body'},
          [
            {k:'costoPallet',  lbl:'Costo Pallet',   u:'ARS'},
            {k:'capPallet',    lbl:'Cap. Pallet',     u:'kg'},
          ].map(({k,lbl,u})=>C('div',{key:k,className:'param-row'},
            C('span',{className:'param-lbl'},lbl),
            C('input',{className:'param-inp',type:'number',step:'1',value:params[k],onChange:e=>upParam(k,e.target.value)}),
            C('span',{className:'param-unit'},u)
          )).concat([
            C('div',{key:'tc',style:{display:'flex',flexDirection:'column',gap:4,padding:'8px 10px',background:'var(--bg3)',borderRadius:'var(--r)',border:'2px solid '+(tcStatus==='ok'?'var(--green)':tcStatus==='error'?'var(--red)':'var(--border)')}},
              C('span',{className:'param-lbl'},'Tipo de Cambio BNA'),
              C('div',{style:{display:'flex',gap:6,alignItems:'center'}},
                C('input',{className:'param-inp',style:{flex:1},type:'number',step:'1',value:params.tipoCambio,onChange:e=>upParam('tipoCambio',e.target.value)}),
                C('span',{className:'param-unit'},'ARS/USD'),
                C('button',{title:'Actualizar desde BNA',onClick:fetchTC,style:{padding:'5px 10px',borderRadius:'var(--r)',border:'1px solid var(--border2)',background:tcStatus==='loading'?'var(--bg3)':tcStatus==='ok'?'var(--green-lt)':tcStatus==='error'?'var(--red-lt)':'var(--bg)',color:tcStatus==='ok'?'var(--green-dk)':tcStatus==='error'?'var(--red)':'var(--text2)',cursor:tcStatus==='loading'?'wait':'pointer',fontSize:14,fontWeight:700,transition:'all .2s',whiteSpace:'nowrap'}},
                  tcStatus==='loading'?'…':tcStatus==='ok'?'✓ OK':tcStatus==='error'?'✗ Error':'↻ BNA')
              ),
              tcLastUpdate&&C('span',{style:{fontSize:10,color:'var(--text3)'}},'Actualiz: '+tcLastUpdate)
            )
          ])
        )
      ),
      // Masters de color + Virgen
      C('div',{className:'param-section',style:{gridColumn:'1/-1'}},
        C('div',{className:'param-section-head'},'Variantes — Preforma Virgen y Masters de Color'),
        C('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:0}},
          [
            {k:'precioPreformaVirgen', lbl:'Preforma Virgen',    u:'USD/kg', note:''},
            {k:'pctMaster',           lbl:'% Master aplicado',  u:'%',      note:'sobre kg de producto'},
            {k:'masterBlanco',        lbl:'Master Blanco',      u:'USD/kg', note:'Liofol o similar'},
            {k:'masterNegro',         lbl:'Master Negro',       u:'USD/kg', note:''},
            {k:'masterAzulino',       lbl:'Master Azulino',     u:'USD/kg', note:''},
            {k:'masterGris',          lbl:'Master Gris',        u:'USD/kg', note:'sin valor aún'},
            {k:'masterAntiblocking',  lbl:'Antiblocking (AB)',  u:'USD/kg', note:'sin valor aún'},
          ].map(({k,lbl,u,note},i)=>C('div',{key:k,style:{padding:'10px 14px',borderBottom:i<6?'1px solid var(--border)':'none',borderRight:(i%3!==2)?'1px solid var(--border)':'none'}},
            C('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:2}},lbl+(note?' — '+note:'')),
            C('div',{style:{display:'flex',alignItems:'center',gap:6}},
              C('input',{className:'param-inp',style:{flex:1,width:'auto'},type:'number',step:'0.01',value:params[k],onChange:e=>upParam(k,e.target.value)}),
              C('span',{className:'param-unit',style:{width:'auto'}},u)
            )
          ))
        )
      ),
      // Tabla de costos por tipo
      C('div',{className:'param-section',style:{gridColumn:'1/-1'}},
        C('div',{className:'param-section-head'},'Costo por variante (calculado en tiempo real)'),
        C('div',{style:{overflowX:'auto'}},
          C('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12.5}},
            C('thead',null,C('tr',null,
              ['Variante','Base','Extra master','Costo/kg total'].map(h=>C('th',{key:h,style:{padding:'7px 12px',textAlign:h==='Variante'?'left':'right',fontSize:11,fontWeight:600,color:'var(--text3)',background:'var(--bg2)',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}},h))
            )),
            C('tbody',null,
              Object.entries(TIPOS).map(([k,t])=>{
                const cd=calcCostoTipo(k,params);
                return C('tr',{key:k,style:{borderBottom:'1px solid var(--border)'}},
                  C('td',{style:{padding:'6px 12px'}}, tipoBadge(k)),
                  C('td',{style:{padding:'6px 12px',textAlign:'right',fontVariantNumeric:'tabular-nums'}},'U$D '+cu(cd.base)),
                  C('td',{style:{padding:'6px 12px',textAlign:'right',fontVariantNumeric:'tabular-nums',color:cd.extra>0?'var(--amber)':'var(--text3)'}},(cd.extra>0?'+ U$D '+cu(cd.extra):'—')),
                  C('td',{style:{padding:'6px 12px',textAlign:'right',fontWeight:700,fontVariantNumeric:'tabular-nums',color:t.color}},'U$D '+cu(cd.total))
                );
              })
            )
          )
        )
      ),
      // Impacto en costo
      C('div',{className:'param-section'},
        C('div',{className:'param-section-head'},'Impacto en costo'),
        C('div',{style:{padding:'14px 16px'}},
          costComps.map(x=>C('div',{key:x.lbl,style:{marginBottom:10}},
            C('div',{style:{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}},
              C('span',{style:{color:'var(--text2)'}},x.lbl),
              C('strong',null,'U$D '+cu(x.val)+' ('+fp(pctOf(x.val))+')')
            ),
            C('div',{className:'bar-bg',style:{height:8}},
              C('div',{className:'bar-fill',style:{width:pctOf(x.val)+'%',background:x.color}})
            )
          ))
        )
      )
    )
  );

  /* ══════════════════ ROUTING ════════════════════════════════════════════ */
  const NAV=[
    {id:'resumen',  lbl:'Resumen',       icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},
    {id:'precios',  lbl:'Precios',       icon:'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z'},
    {id:'costos',   lbl:'Costos',        icon:'M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M12 15h.01M15 15h.01M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z'},
    {id:'analisis', lbl:'Análisis',      icon:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'},
    {id:'detalle',  lbl:'Detalle',       icon:'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z'},
    {id:'pedidos',  lbl:'Pedidos',       icon:'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 17h.01'},
    {id:'nuevo',    lbl:'+ Agregar cliente', icon:'M12 4v16m8-8H4'},
    {id:'params',   lbl:'Parámetros',    icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z|M15 12a3 3 0 11-6 0 3 3 0 016 0z'},
  ];
  const titles={resumen:'Resumen',precios:'Precios',costos:'Costos',analisis:'Análisis',detalle:'Detalle',pedidos:'Pedidos',nuevo:'Agregar cliente',params:'Parámetros'};
  const views={resumen:ViewResumen,precios:ViewPrecios,costos:ViewCostos,analisis:ViewAnalisis,detalle:ViewDetalle,pedidos:ViewPedidos,nuevo:ViewNuevo,params:ViewParams};

  return C('div',null,
    C('div',{className:'sidebar'},
      C('div',{className:'logo'},
        C('div',{className:'logo-mark'},'WINFLEX'),
        C('div',{className:'logo-sub'},'Lámina PET — v1.0'),
        C('div',{className:'logo-badge'},Object.keys(TIPOS).length+' variantes de producto')
      ),
      C('nav',{className:'nav'},
        C('div',{className:'nav-sec'},'Secciones'),
        NAV.map(item=>C('button',{key:item.id,className:'nav-item'+(view===item.id?' active':''),onClick:()=>setView(item.id)},
          C(Ico,{d:item.icon}), item.lbl
        ))
      ),
      C('div',{className:'sidebar-foot'},
      C('button',{
        style:{width:'100%',padding:'6px',marginBottom:8,background:'var(--blue-lt)',border:'1px solid #C2E8D3',borderRadius:'var(--r)',fontSize:11,fontWeight:700,color:'var(--blue)',cursor:'pointer'},
        onClick:guardarCambios
      },'☁ Guardar cambios'),
        C('div',null,computed.filter(cl=>cl.pventa>0).length+' clientes con precio'),
        C('div',null,'Costo: U$D '+cu(costo.total)+'/kg'),
        C('div',null,'Margen prom: '+fp(avgM)),
        C('div',null,pedidos.length+' pedidos registrados')
      )
    ),
    C('div',{className:'main'},
      C('div',{className:'topbar'},
        C('div',null,
          C('div',{className:'page-heading'},titles[view]),
          C('div',{className:'page-sub'},'Winflex S.A. — Lámina PET · '+Object.keys(TIPOS).length+' variantes')
        ),
        C('div',{style:{display:'flex',gap:8,alignItems:'center'}},
          // TC chip
          C('div',{
            style:{display:'flex',alignItems:'center',gap:6,padding:'5px 10px',borderRadius:'var(--r)',border:'1px solid var(--border2)',background:'var(--bg2)',cursor:'pointer',transition:'all .2s',
              ...(tcStatus==='ok'?{borderColor:'var(--green)',background:'var(--green-lt)'}:tcStatus==='error'?{borderColor:'var(--red)',background:'var(--red-lt)'}:{})},
            onClick:fetchTC,
            title:'Clic para actualizar el tipo de cambio desde Banco Nación Argentina',
          },
            C('span',{style:{fontSize:11,color:'var(--text3)'}},tcStatus==='loading'?'BNA…':tcStatus==='ok'?'BNA ✓':tcStatus==='error'?'BNA ✗':'BNA'),
            C('span',{style:{fontSize:13,fontWeight:700,fontVariantNumeric:'tabular-nums',color:tcStatus==='ok'?'var(--green-dk)':tcStatus==='error'?'var(--red)':'var(--text)'}},
              '$ '+params.tipoCambio.toLocaleString('es-AR')
            ),
            C('span',{style:{fontSize:11,color:'var(--text3)'}},'↻')
          ),
          C('button',{className:'btn btn-blue',onClick:()=>exportResumen(computed,costo,params)},
            C(Ico,{d:'M12 3v13|M7 11l5 5 5-5|M3 20h18',s:14,stroke:'white'}), 'Descargar Excel'
          ),
          C('div',{
            onClick:guardarCambios,
            title:'Clic para guardar todos los cambios en la nube',
            style:{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',borderRadius:'var(--r)',border:'1px solid var(--border2)',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all .15s',
              background:syncStatus==='ok'?'var(--green-lt)':syncStatus==='error'?'var(--red-lt)':syncStatus==='loading'?'var(--blue-lt)':syncStatus==='saving'?'var(--amber-lt)':'var(--bg2)',
              color:syncStatus==='ok'?'var(--green-dk)':syncStatus==='error'?'var(--red)':syncStatus==='loading'?'var(--blue)':syncStatus==='saving'?'var(--amber)':'var(--text2)',
            }},
            syncStatus==='saving'?'☁ Guardando…':syncStatus==='ok'?'✓ Guardado':syncStatus==='error'?'✗ Sin conexión':syncStatus==='loading'?'☁ Cargando…':'☁ Guardar'
          )
        )
      ),
      C('div',{className:'content'},views[view])
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(C(App));
</script>
</body>
