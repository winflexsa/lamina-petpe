<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lámina · Costos y precios por cliente</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-lamina-192.png">
<link rel="apple-touch-icon" href="icon-lamina-192.png">
<meta name="theme-color" content="#1e9e62">
<link rel="manifest" href="manifest-lamina.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #EEF5F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .logo {
    font-size: 32px;
    font-weight: 800;
    color: #1E9E62;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .sub {
    font-size: 14px;
    color: #888;
    margin-bottom: 40px;
  }
  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  a.card {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: white;
    border-radius: 16px;
    padding: 28px 32px;
    width: 260px;
    text-decoration: none;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    border: 2px solid transparent;
    transition: all .15s;
  }
  a.card:hover {
    border-color: #1E9E62;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(24,95,165,.15);
  }
  .card-icon {
    font-size: 36px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a18;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .card-btn {
    display: inline-block;
    background: #1E9E62;
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    text-align: center;
  }
  a.card:hover .card-btn {
    background: #15663F;
  }
  .footer {
    margin-top: 40px;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>
  <div class="logo">WINFLEX</div>
  <div class="sub">Winflex S.A. — Gestión de costos y precios</div>

  <div class="cards">
    <a class="card" href="Winflex_PET_PE_v2.html">
      <div>
        <div class="card-icon">🏭</div>
        <div class="card-title">Lámina PET / PE</div>
        <div class="card-desc">Costos, precios y pedidos para lámina PET/PE laminada. 15 clientes activos.</div>
      </div>
      <div class="card-btn">Abrir →</div>
    </a>

    <a class="card" href="Winflex_Lamina_PET.html">
      <div>
        <div class="card-icon">🔬</div>
        <div class="card-title">Lámina PET</div>
        <div class="card-desc">Costos y precios para rPET Cristal, Blanco, Negro, Azulino, Virgen y más variantes.</div>
      </div>
      <div class="card-btn">Abrir →</div>
    </a>
  </div>

  <div class="footer">Winflex S.A. · Lanús y Chivilcoy</div>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw-lamina.js").catch(function(){});});}</script>
